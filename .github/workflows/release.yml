name: Publish Daily Release

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Detect pending release notes
        id: pending
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          latest_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
          if [ -z "$latest_tag" ]; then
            echo "No stable release tag exists; refusing to infer the release range." >&2
            exit 1
          fi

          mapfile -t notes < <(git diff --name-only --diff-filter=A "$latest_tag" "$RELEASE_SHA" -- .release-notes | grep -Ev '/README\.md$' || true)
          if [ "${#notes[@]}" -eq 0 ]; then
            echo "No unreleased user-facing changes; skipping application release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for note in "${notes[@]}"; do
            node scripts/release-notes.mjs check-file "$note"
          done
          note_file="$RUNNER_TEMP/agent-recall-release-note.md"
          node scripts/release-notes.mjs combine "${notes[@]}" > "$note_file"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "note_file=$note_file" >> "$GITHUB_OUTPUT"

      - name: Compute idempotent release version
        if: steps.pending.outputs.publish == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          NOTE_FILE: ${{ steps.pending.outputs.note_file }}
          MERGED_SHA: ${{ github.sha }}
        run: node scripts/compute-release-version.mjs

      - name: Install dependencies
        if: steps.pending.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        run: npm ci

      - name: Test and build
        if: steps.pending.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: Build release assets
        if: steps.pending.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        id: assets
        env:
          NOTE_FILE: ${{ steps.pending.outputs.note_file }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          package_file="$(npm pack --pack-destination release | tail -1)"
          node scripts/create-release-assets.mjs \
            --note "$NOTE_FILE" \
            --version "$VERSION" \
            --package "release/$package_file" \
            --repository "$GITHUB_REPOSITORY" \
            --output release
          node scripts/create-release-assets.mjs \
            --validate \
            --version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --output release
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: steps.pending.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          MERGED_SHA: ${{ github.sha }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$MERGED_SHA" -m "AgentRecall $TAG"
            git push origin "$TAG"
          fi
          if release_is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$release_is_draft" != "true" ]; then
              echo "Release $TAG already exists and is published; refusing to overwrite it."
              exit 1
            fi
            gh release edit "$TAG" --title "AgentRecall $TAG" --notes-file release/release-notes.md
          else
            gh release create "$TAG" --draft --verify-tag --title "AgentRecall $TAG" --notes-file release/release-notes.md
          fi
          gh release upload "$TAG" release/*.tgz release/*.sha256 release/update.json --clobber
          verify_directory="$(mktemp -d)"
          gh release download "$TAG" \
            --pattern "agent-recall-${VERSION}.tgz" \
            --pattern "agent-recall-${VERSION}.tgz.sha256" \
            --pattern "agent-recall.tgz" \
            --pattern "agent-recall.tgz.sha256" \
            --pattern "update.json" \
            --dir "$verify_directory"
          node scripts/create-release-assets.mjs \
            --validate \
            --version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --output "$verify_directory"
          gh release edit "$TAG" --draft=false
